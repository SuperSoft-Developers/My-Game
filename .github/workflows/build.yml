name: Build My Game macOS

on:
  push:
  pull_request:

jobs:
  build-macos:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Raylib
        run: |
          brew update
          brew install raylib

      - name: Build
        run: |
          g++ main.cpp -o MyGame \
            -std=c++17 \
            -I$(brew --prefix)/include \
            -L$(brew --prefix)/lib \
            -lraylib

      - name: Create App Bundle
        run: |
          mkdir -p MyGame.app/Contents/MacOS
          mkdir -p MyGame.app/Contents/Resources

          cp MyGame MyGame.app/Contents/MacOS/

          cat > MyGame.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>MyGame</string>
              <key>CFBundleIdentifier</key>
              <string>com.supersoft.mygame</string>
              <key>CFBundleName</key>
              <string>My Game</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
          </dict>
          </plist>
          EOF

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: MyGame-macOS
          path: MyGame.app
